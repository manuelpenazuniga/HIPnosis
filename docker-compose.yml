# docker-compose.yml — dos perfiles (blueprint §9):
#   replay : `docker compose --profile replay up`  → CUALQUIER laptop, sin GPU.
#            Levanta el dashboard vivo con un trace grabado. Es como los jueces
#            reproducen el proyecto sin MI300X (F-16). ES LA PRIMERA INSTRUCCIÓN DEL README.
#   gpu    : `docker compose --profile gpu up`     → droplet MI300X (real).
#            Orquestador ROCm + vLLM con Gemma. Se valida en M0.

services:
  # --- PERFIL REPLAY (jueces / demo sin GPU) ---
  orchestrator-replay:
    profiles: ["replay"]
    build:
      context: .
      dockerfile: docker/Dockerfile.replay
    environment:
      ORACLE_MODE: replay
    ports:
      - "8080:8080"
    restart: unless-stopped

  # --- PERFIL GPU (droplet MI300X real) ---
  orchestrator:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      ORACLE_MODE: real
      LOCAL_LLM_BASE_URL: http://vllm:8000/v1
      LOCAL_LLM_MODEL: google/gemma-3-27b-it
      GPU_ARCH: gfx942
      # P0.12: el endpoint público solo portea los repos demo curados (ejecuta
      # su Makefile+binario con los tokens montados). Override con REPO_ALLOWLIST.
      REPO_ALLOWLIST: ${REPO_ALLOWLIST:-bsw-cuda,softmax-cuda,scan-cuda}
    env_file:
      # secretos (FIREWORKS_API_KEY, HF_TOKEN, GITHUB_TOKEN); NO versionado.
      # required: false → no rompe si aún no se creó el .env (se crea en M0 en el droplet).
      - path: orchestrator/.env
        required: false
    ports:
      - "8080:8080"
    # Acceso a la GPU AMD (KFD/DRI) para los builds hipcc y la ejecución de kernels.
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./workspaces:/app/orchestrator/workspaces    # repos git por run (persistidos)
    depends_on:
      - vllm
    restart: unless-stopped

  # vLLM con Gemma 3 27B IT — imagen OFICIAL, no se compila nada (F-01).
  vllm:
    profiles: ["gpu"]
    # Pineada a la familia gfx94X (MI300X = gfx942); `latest` hacía la demo
    # irreproducible (audit codex P0.11). Override para M0: VLLM_IMAGE_TAG en el shell.
    image: rocm/vllm:${VLLM_IMAGE_TAG:-rocm7.13.0_gfx94X-dcgpu_ubuntu24.04_py3.13_pytorch_2.10.0_vllm_0.19.1}
    env_file:
      # HF_TOKEN llega por el MISMO orchestrator/.env que documenta el README/M0.
      # OJO: no volver a declarar HF_TOKEN bajo `environment:` — environment tiene
      # precedencia sobre env_file y una interpolación vacía ${HF_TOKEN:-} lo pisaría.
      - path: orchestrator/.env
        required: false
    command: >
      --model google/gemma-3-27b-it
      --max-model-len 32768
    ports:
      - "8000:8000"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    ipc: host
    restart: unless-stopped
